name: Publish
on:
  release:
    types: [published]
jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - name: Load secrets from 1Password
        uses: 1password/load-secrets-action@v3
        with:
          export-env: true
        env:
          OP_SERVICE_ACCOUNT_TOKEN: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN }}
          NPM_TOKEN: op://EcAuth/npmjs-credentials/credential
          CLOUDFLARE_API_TOKEN: op://EcAuth/cloudflare-credentials/CLOUDFLARE_API_TOKEN
          CLOUDFLARE_ACCOUNT_ID: op://EcAuth/cloudflare-credentials/CLOUDFLARE_ACCOUNT_ID
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'
      - run: corepack enable
      - run: pnpm install --frozen-lockfile
      - run: pnpm run build
      - run: pnpm run test
      - run: pnpm publish --provenance --access public --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{ env.NPM_TOKEN }}

      - name: Upload build artifacts to release
        run: |
          VERSION=$(node -p "require('./package.json').version")
          gh release upload "v${VERSION}" dist/ecauth-auth.umd.js dist/ecauth-auth.esm.js --clobber
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Prepare CDN files
        run: |
          VERSION=$(node -p "require('./package.json').version")
          mkdir -p cdn-dist/auth-js/${VERSION}
          mkdir -p cdn-dist/auth-js/latest
          cp dist/ecauth-auth.umd.js cdn-dist/auth-js/${VERSION}/
          cp dist/ecauth-auth.esm.js cdn-dist/auth-js/${VERSION}/
          cp dist/ecauth-auth.umd.js cdn-dist/auth-js/latest/
          cp dist/ecauth-auth.esm.js cdn-dist/auth-js/latest/

      - name: Download past versions from GitHub Releases
        run: |
          for tag in $(gh release list --limit 100 --json tagName -q '.[].tagName'); do
            version="${tag#v}"
            if [ -d "cdn-dist/auth-js/${version}" ]; then continue; fi
            mkdir -p "cdn-dist/auth-js/${version}"
            gh release download "$tag" --pattern "*.umd.js" --dir "cdn-dist/auth-js/${version}" || true
            gh release download "$tag" --pattern "*.esm.js" --dir "cdn-dist/auth-js/${version}" || true
          done
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ env.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ env.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy cdn-dist --project-name=ecauth-cdn
